name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.23"
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Build
        run: go build ./...
